# Configuração do assessment activo — trocar aqui para mudar o teste a auditar.
# Este ficheiro NÃO contém credenciais — pode ser partilhado e commitado.
# As credenciais (token, school id, API key) ficam no .env.

# Sigla do programa em letras minúsculas e número da edição.
# Exemplo: pggf2
PROGRAM=programa1

# Título da atividade — usado como nome da subpasta de output.
# Exemplo: uc5-fintech
LABEL=uc1-exemplo

# Nome de apresentação da unidade curricular (para relatórios de auditoria).
# Opcional — se omitido, o sistema deriva automaticamente do LABEL.
# Exemplo: UC1 Mercados e Economia Financeira
LABEL_DISPLAY=UC1: Exemplo

# ID da atividade — sequência de 24 caracteres no final do URL da atividade
# no admin LearnWorlds. Exemplo: 000000000000000000000000
ASSESSMENT_ID=000000000000000000000000

# Época de avaliação. Valores: Normal | Extraordinária
EPOCA=Normal
